name: Build Android APK Emergency Edition

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Dependencies
      run: npm install

    - name: Initialize Capacitor Android Project
      run: |
        npx cap init "CyberChat P2P" "com.p2p.cyberchat" --web-dir=.
        npx cap add android

    - name: Inject Hardcore Manifest and Java Code
      run: |
        # Перезаписываем стандартный манифест сборщика нашим жестким файлом
        cp AndroidManifest.xml android/app/src/main/AndroidManifest.xml
        
        # Перезаписываем главный Java-файл управления WebView
        mkdir -p android/app/src/main/java/com/p2p/cyberchat/
        cp android/app/src/main/java/com/p2p/cyberchat/MainActivity.java android/app/src/main/java/com/p2p/cyberchat/MainActivity.java

    - name: Sync Web Assets to Android
      run: npx cap sync android

    - name: Build APK with Gradle
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: CyberChat-P2P-App
        path: android/app/build/outputs/apk/debug/app-debug.apk
        
