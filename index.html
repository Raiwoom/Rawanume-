<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram P2P Global</title>
    <!-- Подключаем легальную глобальную P2P библиотеку для связи на неограниченном расстоянии -->
    <script src="https://unpkg.com"></script>
    <style>
        :root {
            --tg-bg: #0e1621; /* Оригинальный темный цвет Telegram */
            --tg-panel: #17212b;
            --tg-active: #2b5278;
            --tg-accent: #2481cc;
            --tg-bubble-me: #24476b;
            --tg-bubble-peer: #182533;
            --text-main: #f5f5f5;
            --text-muted: #7f91a4;
            --border: 1px solid rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--tg-bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif;
            color: var(--text-main);
            height: 100vh; width: 100vw;
            display: flex; overflow: hidden;
        }

        /* Панель контактов (Стиль Telegram) */
        .sidebar {
            width: 30%; min-width: 290px; max-width: 380px;
            background: var(--tg-panel);
            border-right: var(--border);
            display: flex; flex-direction: column;
            z-index: 10;
        }

        .search-container {
            padding: 14px; background: var(--tg-panel);
            display: flex; flex-direction: column; gap: 8px;
            border-bottom: var(--border);
        }
        .tg-input {
            width: 100%; background: var(--tg-bg); border: 1px solid rgba(255,255,255,0.08);
            padding: 10px 14px; border-radius: 10px; color: #fff;
            outline: none; font-size: 14px; transition: border 0.2s;
        }
        .tg-input:focus { border-color: var(--tg-accent); }
        .tg-btn {
            background: var(--tg-accent); color: #fff; border: none;
            padding: 10px; border-radius: 10px; font-weight: 600;
            cursor: pointer; font-size: 13px; text-transform: uppercase;
            box-shadow: 0 4px 12px rgba(36, 129, 204, 0.2);
        }

        .contacts-scroll { flex: 1; overflow-y: auto; }
        .contact-card {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 16px; cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            transition: background 0.15s;
        }
        .contact-card:hover, .contact-card.active { background: var(--tg-active); }
        .avatar {
            width: 46px; height: 46px; border-radius: 50%;
            background: linear-gradient(135deg, #3a7bd5, #3a6073);
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 15px; color: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .meta { flex: 1; overflow: hidden; }
        .meta h4 { font-size: 15px; font-weight: 600; color: #fff; display: flex; justify-content: space-between; align-items: center; }
        .meta p { font-size: 12px; color: var(--text-muted); text-overflow: ellipsis; white-space: nowrap; overflow: hidden; margin-top: 3px; }

        /* Главная зона чата */
        .chat-view { flex: 1; display: flex; flex-direction: column; background: var(--tg-bg); position: relative; }
        .chat-view::before {
            content: ''; position: absolute; inset: 0;
            background-image: url('https://githubusercontent.com');
            opacity: 0.03; pointer-events: none;
        }

        .chat-header {
            height: 60px; background: var(--tg-panel); padding: 10px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: var(--border); z-index: 5;
        }
        
        .chat-body { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 12px; z-index: 5; }
        .badge { align-self: center; font-size: 11px; background: rgba(23, 33, 43, 0.8); padding: 6px 16px; border-radius: 12px; color: #76c6ff; border: var(--border); font-family: monospace; }
        
        .msg-line { display: flex; width: 100%; }
        .msg-line.me { justify-content: flex-end; }
        .msg-line.peer { justify-content: flex-start; }
        .bubble { max-width: 70%; padding: 10px 14px; border-radius: 16px; font-size: 14.5px; line-height: 1.45; color: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.15); position: relative; }
        .msg-line.me .bubble { background: var(--tg-bubble-me); border-bottom-right-radius: 3px; }
        .msg-line.peer .bubble { background: var(--tg-bubble-peer); border-bottom-left-radius: 3px; }
        
        .crypto-lbl { font-size: 8px; color: #52aaff; display: block; text-align: right; margin-top: 5px; font-family: monospace; font-weight: bold; }
        .media-box { max-width: 100%; max-height: 220px; border-radius: 10px; margin-top: 6px; display: block; object-fit: cover; }
        .audio-node { width: 100%; margin-top: 6px; accent-color: var(--tg-accent); }

        /* Консоль ввода текста */
        .input-panel { height: 65px; background: var(--tg-panel); padding: 10px 16px; display: flex; align-items: center; gap: 12px; border-top: var(--border); z-index: 5; }
        .control-btn { background: none; border: none; color: var(--text-muted); font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: color 0.2s; }
        .control-btn:hover { color: var(--tg-accent); }
        .field { flex: 1; background: var(--tg-bg); border: 1px solid rgba(255,255,255,0.04); padding: 11px 16px; border-radius: 12px; color: #fff; outline: none; font-size: 14.5px; }

        /* Экран звонка Glassmorphism */
        #callOverlay { display: none; position: fixed; inset: 0; z-index: 99999; background: rgba(14, 22, 33, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 30px; flex-direction: column; justify-content: space-between; align-items: center; }
        .video-box { width: 100%; flex: 1; display: flex; flex-direction: column; gap: 16px; margin: 20px 0; justify-content: center; }
        .vid-window { width: 100%; max-width: 360px; height: 220px; background: #0b0f14; border-radius: 24px; overflow: hidden; border: 1px solid rgba(36, 129, 204, 0.3); position: relative; align-self: center; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        video { width: 100%; height: 100%; object-fit: cover; }
        .hangup-btn { background: linear-gradient(90deg, #ef4444, #b91c1c); color: white; border: none; padding: 16px; width: 85%; max-width: 280px; border-radius: 22px; font-weight: bold; font-size: 15px; cursor: pointer; box-shadow: 0 10px 20px rgba(239,68,68,0.3); }
        
        .rec-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body onload="connectToGlobalP2PNet()">

    <!-- Интерфейс глобального видеовызова -->
    <div id="callOverlay">
        <div style="color: var(--tg-accent); font-family: monospace; font-size: 12px; font-weight: bold; letter-spacing: 2px;">🔒 SECURE P2P GLOBAL STREAM</div>
        <div class="video-box">
            <div class="vid-window" style="border-color: var(--tg-accent);"><video id="peerVideo" autoplay playsinline></video></div>
            <div class="vid-window" style="border-color: #9333ea;"><video id="myVideo" autoplay playsinline muted></video></div>
        </div>
        <button onclick="terminateGlobalCall()" class="hangup-btn">ЗАВЕРШИТЬ ВЫЗОВ</button>
    </div>

    <!-- СИДБАР: Поиск и Контакты (Стиль Telegram) -->
    <div class="sidebar">
        <div class="search-container">
            <div style="font-size: 13px; color: var(--tg-accent); font-weight: bold; margin-bottom: 4px;" id="myGlobalP2PId">Мой ID: Инициализация...</div>
            <input type="text" id="newContactName" placeholder="Имя контакта (например, Алекс)" class="tg-input">
            <input type="text" id="newContactID" placeholder="Глобальный P2P ID контакта..." class="tg-input">
            <button onclick="registerContactInNet()" class="tg-btn">Добавить контакт</button>
            <button onclick="copyMyP2PID()" class="tg-btn" style="background:#182533; border:1px solid rgba(255,255,255,0.05); color:var(--tg-accent); margin-top: 4px;">Скопировать мой ID</button>
        </div>
        <div class="contacts-scroll" id="contactsContainer">
            <!-- Контакты рендерятся динамически -->
        </div>
    </div>

    <!-- ОСНОВНОЙ ЭКРАН ЧАТА -->
    <div class="chat-view">
        <div class="chat-header">
            <div style="display:flex; align-items:center; gap:12px;">
                <div class="avatar" id="activeAvatar" style="width:38px; height:38px; font-size:14px; background:#2481cc;">?</div>
                <div>
                    <h3 id="activeName" style="font-size:15px; font-weight: 600;">Выберите контакт</h3>
                    <p id="activeStatus" style="font-size:11px; color:var(--text-muted);">Сессия не активна</p>
                </div>
            </div>
            <div class="btn-group" id="callControls" style="display: none;">
                <button onclick="initiateGlobalVoiceCall(false)" class="control-btn" style="color:var(--tg-accent);">📞</button>
                <button onclick="initiateGlobalVoiceCall(true)" class="control-btn" style="color:var(--tg-accent); margin-left:15px;">📹</button>
            </div>
        </div>

        <!-- Окно сообщений -->
        <div id="chatArea" class="chat-body">
            <div class="badge">Добавьте глобальный ID пира, чтобы общаться на неограниченном расстоянии напрямую.</div>
        </div>

        <!-- Консоль отправки медиа и текста -->
